# Experiment 1 100q: CoT prompt, no shuffle, with paraphrases
run_name: "exp1_100q_cot_noshuffle_para"

model: "qwen3:8b-q4_K_M"
question_set: "mmlu_standard"
confidence_threshold: 0.95
max_queries_per_question: 100
max_questions: 100
seed: 2024
monte_carlo_samples: 10000
temperature: 0.7
parallel_workers: 4

think: false
prompt_mode: "cot"
shuffle_choices: false
use_paraphrases: true
